name: Build & Publish Docker Images

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push hub
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.hub
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/hugr-lab/hub:${{ github.ref_name }}
            ghcr.io/hugr-lab/hub:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-singleuser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push singleuser
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.singleuser
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/hugr-lab/hub-singleuser:${{ github.ref_name }}
            ghcr.io/hugr-lab/hub-singleuser:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-singleuser-ds:
    runs-on: ubuntu-latest
    needs: build-singleuser
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push singleuser-ds
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.singleuser-ds
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/hugr-lab/hub-singleuser-ds:${{ github.ref_name }}
            ghcr.io/hugr-lab/hub-singleuser-ds:latest
          build-args: |
            BASE_IMAGE=ghcr.io/hugr-lab/hub-singleuser:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
