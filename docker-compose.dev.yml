# Dev: JupyterHub + Hub Service. Hugr and Keycloak run on host.
#
# Prerequisites:
#   - Hugr dev server on localhost:15004 (with embedding source configured)
#   - Keycloak on localhost:18070
#   - PostgreSQL on localhost:5432 (for hub DB, Hugr will provision)
#   - Singleuser image built: docker compose -f docker-compose.local.yml build
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#   open http://localhost:8000

services:
  hub:
    build:
      context: .
      dockerfile: Dockerfile.hub
    env_file: ${HUB_ENV_FILE:-.env}
    environment:
      HUB_CONNECT_IP: hub
      HUB_SERVICE_URL: http://host.docker.internal:8082
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - hub-data:/srv/jupyterhub
      - ./config:/srv/jupyterhub/config
      - ./certs:/srv/jupyterhub/certs:ro
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - hub-dev-network
    depends_on:
      hub-service:
        condition: service_started
    restart: unless-stopped

  hub-service:
    build:
      context: .
      dockerfile: Dockerfile.hub-service
    env_file: ${HUB_ENV_FILE:-.env}
    environment:
      HUGR_URL: "http://host.docker.internal:15004/ipc"
      HUGR_SECRET_KEY: "${HUGR_SECRET_KEY:-secret-key}"
      HUB_SERVICE_LISTEN: ":8082"
      HUB_SERVICE_FLIGHT: ":50051"
      HUB_DATABASE_DSN: "postgres://hugr:hugr_password@host.docker.internal:18032/hub"
      HUB_REDIS_URL: "redis://host.docker.internal:6379/0"
      HUB_SERVICE_INTERNAL_URL: "http://hub-service:8082"
      HUB_AGENT_NETWORK: "hub-dev-network"
      LOG_LEVEL: "debug"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8082:8082"
      - "50051:50051"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - hub-dev-network
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - hub-dev-network
    restart: unless-stopped

volumes:
  hub-data:

networks:
  hub-dev-network:
    name: hub-dev-network
