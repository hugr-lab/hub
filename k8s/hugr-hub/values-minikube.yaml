# =============================================================================
# Minikube development overrides
#
# Prerequisites:
#   - Hugr on host at localhost:15004
#   - Keycloak on host at localhost:18070
#   - Images built inside minikube docker:
#     eval $(minikube docker-env)
#     docker build -f Dockerfile.hub -t hub-jupyterhub:latest .
#     docker build -f Dockerfile.singleuser -t hub-jupyter:latest .
# =============================================================================

hub:
  hugrUrl: "http://host.minikube.internal:15004"
  baseDomain: "http://localhost:8000"
  oidc:
    clientId: "hugr-hub"
    clientSecret: "change-me"       # Override with --set hub.oidc.clientSecret=...
  admin:
    users: "admin"
  profiles:
    claim: "x-hub-profile"
    roleClaim: "x-hugr-role"
  secretProvider: "env"
  connectionName: "default"

# Initial profiles.json — seeded to PVC on first install
profiles:
  default_profile: "small"
  profiles:
    small:
      display_name: "Small"
      description: "2 CPU, 4GB RAM"
      mem_limit: "4G"
      mem_guarantee: "512M"
      cpu_limit: 2.0
      cpu_guarantee: 0.25
      rank: 1
      volumes:
        shared-data:
          mount: "/home/jovyan/shared"
          mode: "ro"
    medium:
      display_name: "Medium"
      description: "4 CPU, 8GB RAM"
      mem_limit: "8G"
      mem_guarantee: "1G"
      cpu_limit: 4.0
      cpu_guarantee: 0.5
      rank: 2
      volumes:
        shared-data:
          mount: "/home/jovyan/shared"
          mode: "rw"
  role_map:
    admin: "medium"
    analyst: "small"
  storage:
    volumes:
      shared-data:
        type: "local"
    credentials: {}

# Shared PVCs — referenced by profiles.json storage.volumes
sharedVolumes:
  shared-data:
    capacity: "1Gi"
    accessMode: "ReadWriteMany"

singleuser:
  image:
    name: "hub-jupyter"
    tag: "latest"
    pullPolicy: "Never"
  storage:
    capacity: "2Gi"
    storageClassName: ""

jupyterhub:
  hub:
    image:
      name: "hub-jupyterhub"
      tag: "latest"
      pullPolicy: "Never"
    existingSecret: hugr-hub-secrets
    config: {}
    extraConfig:
      zz-load-hub-config: |
        load_subconfig('/opt/hub/jupyterhub_config.py')
    extraEnv:
      HUGR_SPAWNER:
        value: "kubernetes"
      HUGR_URL:
        value: "http://host.minikube.internal:15004"
      HUB_BASE_URL:
        value: "http://localhost:8000"
      HUGR_SECRET_PROVIDER:
        value: "env"
      OIDC_CLIENT_ID:
        value: "hugr-hub"
      HUGR_ADMIN_USERS:
        value: "admin"
      HUGR_ROLE_CLAIM:
        value: "x-hugr-role"
      HUGR_PROFILE_CLAIM:
        value: "x-hub-profile"
      HUGR_CONNECTION_NAME:
        value: "default"
      HUGR_PROFILES_PATH:
        value: "/opt/hub/config/profiles.json"
      SINGLEUSER_IMAGE:
        value: "hub-jupyter:latest"
      HUGR_FUSE_ENABLED:
        value: "false"
      OIDC_CLIENT_SECRET:
        valueFrom:
          secretKeyRef:
            name: hugr-hub-secrets
            key: OIDC_CLIENT_SECRET
      # Storage credentials (resolved by hub_profiles via ${secret:KEY})
      MINIO_USER:
        value: "minio_admin"
      MINIO_PASSWORD:
        value: "minio_password123"
      MINIO_ENDPOINT:
        value: "http://host.minikube.internal:18080"
      AZURE_HUGRHUBTEST_KEY:
        value: ""  # Override with --set
    extraVolumes:
      - name: hub-config
        persistentVolumeClaim:
          claimName: hugr-hub-config
    extraVolumeMounts:
      - name: hub-config
        mountPath: /opt/hub/config

  proxy:
    service:
      type: NodePort
      nodePorts:
        http: 30080

  singleuser:
    image:
      name: "hub-jupyter"
      tag: "latest"
      pullPolicy: "Never"
    # Disable fsGroup — CSI FUSE volumes (S3) don't support chown
    fsGid: null
    extraPodConfig:
      securityContext:
        fsGroupChangePolicy: OnRootMismatch
    storage:
      type: dynamic
      capacity: "2Gi"
      homeMountPath: /home/jovyan
    startTimeout: 120

  prePuller:
    hook:
      enabled: false
    continuous:
      enabled: false

  scheduling:
    userScheduler:
      enabled: false

  cull:
    enabled: false
