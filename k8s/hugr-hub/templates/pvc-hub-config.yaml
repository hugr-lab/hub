apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "hugr-hub.fullname" . }}-config
  labels:
    {{- include "hugr-hub.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 64Mi
  {{- if .Values.hub.configStorage.storageClassName }}
  storageClassName: {{ .Values.hub.configStorage.storageClassName | quote }}
  {{- end }}
