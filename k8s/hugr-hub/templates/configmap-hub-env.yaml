apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "hugr-hub.fullname" . }}-env
  labels:
    {{- include "hugr-hub.labels" . | nindent 4 }}
data:
  HUGR_SPAWNER: "kubernetes"
  HUGR_PROFILES_PATH: "/opt/hub/config/profiles.json"
  {{- with .Values.hub.hugrUrl }}
  HUGR_URL: {{ . | quote }}
  {{- end }}
  {{- with .Values.hub.baseDomain }}
  HUB_BASE_URL: {{ . | quote }}
  {{- end }}
  {{- with .Values.hub.oidc.clientId }}
  OIDC_CLIENT_ID: {{ . | quote }}
  {{- end }}
  {{- if .Values.hub.oidc.tlsSkipVerify }}
  OIDC_TLS_SKIP_VERIFY: "true"
  {{- end }}
  {{- if .Values.hub.hugrTlsSkipVerify }}
  HUGR_TLS_SKIP_VERIFY: "true"
  {{- end }}
  # Admin detection is driven by the hub:management.admin capability in
  # Hugr core.role_permissions. Deployments grant it to a role via a
  # one-time mutation (see pkg/hubapp/CAPABILITIES.md). The legacy
  # HUGR_ADMIN_CLAIM / HUGR_ADMIN_VALUES / HUGR_ADMIN_USERS env vars
  # have been removed (2026-04-10).
  {{- with .Values.hub.profiles.claim }}
  HUGR_PROFILE_CLAIM: {{ . | quote }}
  {{- end }}
  {{- with .Values.hub.profiles.roleClaim }}
  HUGR_ROLE_CLAIM: {{ . | quote }}
  {{- end }}
  {{- with .Values.hub.secretProvider }}
  HUGR_SECRET_PROVIDER: {{ . | quote }}
  {{- end }}
  {{- with .Values.hub.connectionName }}
  HUGR_CONNECTION_NAME: {{ . | quote }}
  {{- end }}
  SINGLEUSER_IMAGE: "{{ .Values.singleuser.image.name }}:{{ .Values.singleuser.image.tag }}"
