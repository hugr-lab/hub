"""Platform users synced from OIDC provider via JupyterHub login."""
type users @table(name: "users") {
  """OIDC username (preferred_username claim)"""
  id: String! @pk
  """Full name from OIDC profile"""
  display_name: String!
  """Email from OIDC profile"""
  email: String
  """Hugr role assigned via OIDC claim (e.g. admin, analyst)"""
  hugr_role: String!
  """Resolved workspace profile name"""
  profile: String
  """Last OIDC login timestamp"""
  last_login_at: Timestamp @default(insert_exp: "NOW()", update_exp: "NOW()")
  """Additional OIDC claims and user preferences"""
  metadata: JSON
}

"""Persistent chat thread belonging to a user. Supports three modes: llm, tools, agent."""
type conversations @table(name: "conversations", soft_delete: true, soft_delete_cond: "deleted_at IS NULL", soft_delete_set: "deleted_at = NOW()") {
  """Conversation ID"""
  id: String! @pk
  """Owner user"""
  user_id: String! @field_references(
    name: "conv_user_ref"
    references_name: "users"
    field: "id"
    query: "user"
    description: "User who owns this conversation"
    references_query: "conversations"
    references_description: "Conversations owned by this user"
  )
  """Display title"""
  title: String!
  """Folder for grouping (nullable)"""
  folder: String
  """Chat mode: llm, tools, or agent"""
  mode: String!
  """Agent type (for mode=agent) — stable across instance restarts"""
  agent_type_id: String
  """Agent identity"""
  agent_id: String @field_references(
    name: "conv_agent_ref"
    references_name: "agents"
    field: "id"
    query: "agent"
    description: "Agent linked to this conversation"
    references_query: "conversations"
    references_description: "Conversations using this agent"
  )
  """LLM model override (for mode=llm)"""
  model: String
  """Parent conversation (for threading — null = root)"""
  parent_id: String @field_references(
    name: "conv_parent_ref"
    references_name: "conversations"
    field: "id"
    query: "parent"
    description: "Parent conversation this was branched from"
    references_query: "branches"
    references_description: "Conversations branched from this one"
  )
  """Message in parent where this branch starts"""
  branch_point_message_id: String
  """User-specified label for this branch"""
  branch_label: String
  """Soft delete timestamp (null = active)"""
  deleted_at: Timestamp
  """Creation timestamp"""
  created_at: Timestamp @default(insert_exp: "NOW()")
  """Last activity timestamp"""
  updated_at: Timestamp @default(insert_exp: "NOW()", update_exp: "NOW()")
}

"""Predefined agent configurations — image, capabilities, skills, and policies."""
type agent_types @table(name: "agent_types") {
  """Unique type identifier (e.g. data-analyst, openclaw)"""
  id: String! @pk
  """Human-readable name shown in UI"""
  display_name: String!
  """What this agent type does"""
  description: String
  """Container image reference (e.g. hugr-lab/hub-agent:latest)"""
  image: String!
  """Allowed capabilities: python, bash, web_search"""
  capabilities: [String]
  """Allowed skill IDs (references filesystem catalog)"""
  allowed_skills: [String]
  """Tool allow/deny policy per tool name"""
  tool_policy: JSON
  """Maximum running instances per user"""
  max_instances_per_user: Int
  """Seconds of inactivity before auto-stop"""
  idle_timeout_seconds: Int
  """Runtime context filter: any, local (workspace only), remote (container only)"""
  runtime_context: String
  """Extra configuration (env vars, resource limits)"""
  metadata: JSON
}

"""Agent identity — persistent entity with Hugr credentials and display info. Runtime state (container_id, auth_token) is in Hub Service memory."""
type agents @table(name: "agents") {
  """Agent UUID"""
  id: String! @pk
  """Agent type configuration"""
  agent_type_id: String! @field_references(
    name: "agents_type_ref"
    references_name: "agent_types"
    field: "id"
    query: "agent_type"
    description: "Agent type configuration"
    references_query: "agents"
    references_description: "Agents of this type"
  )
  """Display name shown in chat UI"""
  display_name: String!
  """What this agent does"""
  description: String
  """Hugr user ID for impersonation"""
  hugr_user_id: String!
  """Hugr user name for audit"""
  hugr_user_name: String!
  """Hugr RBAC role"""
  hugr_role: String!
  """Last interaction timestamp"""
  last_activity_at: Timestamp
  """Creation timestamp"""
  created_at: Timestamp @default(insert_exp: "NOW()")
  """Extra configuration"""
  metadata: JSON
}

"""User-Agent access grant. M:N relationship with owner/member roles."""
type user_agents @table(name: "user_agents") {
  """User granted access"""
  user_id: String! @pk @field_references(
    name: "ua_user_ref"
    references_name: "users"
    field: "id"
    query: "user"
    description: "User with access to this agent"
    references_query: "agent_access"
    references_description: "Agent access grants for this user"
  )
  """Agent being accessed"""
  agent_id: String! @pk @field_references(
    name: "ua_agent_ref"
    references_name: "agents"
    field: "id"
    query: "agent"
    description: "Agent this access grant is for"
    references_query: "user_access"
    references_description: "User access grants for this agent"
  )
  """Access level: owner (manage + chat) or member (chat only)"""
  role: String!
  """When access was granted"""
  created_at: Timestamp @default(insert_exp: "NOW()")
}

"""Agent session — a conversation between a user and their agent."""
type agent_sessions @table(name: "agent_sessions") {
  """Session UUID"""
  id: String! @pk
  """User who owns this session"""
  user_id: String! @field_references(
    name: "sessions_user_ref"
    references_name: "users"
    field: "id"
    query: "user"
    description: "User who owns this session"
    references_query: "agent_sessions"
    references_description: "Agent sessions for this user"
  )
  """Agent running this session"""
  agent_id: String @field_references(
    name: "sessions_agent_ref"
    references_name: "agents"
    field: "id"
    query: "agent"
    description: "Agent running this session"
    references_query: "sessions"
    references_description: "Sessions on this agent"
  )
  """Session start timestamp"""
  started_at: Timestamp @default(insert_exp: "NOW()")
  """Session end timestamp (null if active)"""
  ended_at: Timestamp
  """Session metadata"""
  metadata: JSON
}

"""Individual message in an agent conversation."""
type agent_messages @table(name: "agent_messages") {
  """Message UUID"""
  id: String! @pk
  """Parent session (legacy, nullable)"""
  session_id: String @field_references(
    name: "messages_session_ref"
    references_name: "agent_sessions"
    field: "id"
    query: "session"
    description: "Session this message belongs to"
    references_query: "messages"
    references_description: "Messages in this session"
  )
  """Conversation this message belongs to"""
  conversation_id: String @field_references(
    name: "messages_conv_ref"
    references_name: "conversations"
    field: "id"
    query: "conversation"
    description: "Conversation this message belongs to"
    references_query: "messages"
    references_description: "Messages in this conversation"
  )
  """Sender role: user, assistant, system, or tool"""
  role: String!
  """Message text content"""
  content: String!
  """Tool calls made by assistant (JSON array)"""
  tool_calls: JSON
  """Tool call ID for tool result messages"""
  tool_call_id: String
  """LLM tokens consumed for this message"""
  tokens_used: Int
  """LLM model used to generate this message"""
  model: String
  """Reference to summary message that replaces this one (when this message has been summarized)"""
  summarized_by: String @field_references(
    name: "messages_summary_ref"
    references_name: "agent_messages"
    field: "id"
    query: "summary"
    description: "Summary message that replaces this one"
    references_query: "summarized_messages"
    references_description: "Original messages this summary directly replaces"
  )
  """True if this message is a summary of other messages"""
  is_summary: Boolean
  """Channel type: final, status, analysis, tool_call, tool_result, plan, sub_agent, dive, hitl, hud, error"""
  channel: String
  """Channel-specific structured data (tool args, plan steps, etc.)"""
  payload: JSON
  """Estimated token count for this message"""
  token_count: Int
  """Which AI model produced this message"""
  model_used: String
  """Filesystem path to context snapshot at this point (for branching)"""
  context_snapshot_ref: String
  """When the message was created"""
  created_at: Timestamp @default(insert_exp: "NOW()")
}

"""Junction linking a summary message to the original messages it covers.
Use it to fetch full original messages from a summary in one GraphQL query, in order."""
type message_summary_items @table(name: "message_summary_items") {
  """Summary message that aggregates the originals"""
  summary_message_id: String! @pk @field_references(
    name: "msi_summary_ref"
    references_name: "agent_messages"
    field: "id"
    query: "summary_message"
    description: "Summary message containing this item"
    references_query: "summary_items"
    references_description: "Original messages covered by this summary, in order"
  )
  """Original message included in the summary"""
  original_message_id: String! @pk @field_references(
    name: "msi_original_ref"
    references_name: "agent_messages"
    field: "id"
    query: "original_message"
    description: "Original message included in the summary"
    references_query: "summary_links"
    references_description: "Summaries that include this message as an original"
  )
  """Position of the original message inside the summary (preserves chronological order)"""
  position: Int!
}

"""Learned information stored with semantic embedding for similarity search."""
type agent_memory @table(name: "agent_memory") @embeddings(
  model: "{{.EmbedderName}}"
  vector: "embedding"
  distance: Cosine
) {
  """Memory entry UUID"""
  id: String! @pk
  """Owner user"""
  user_id: String! @field_references(
    name: "memory_user_ref"
    references_name: "users"
    field: "id"
    query: "user"
    description: "User who owns this memory"
    references_query: "memories"
    references_description: "Stored memories for this user"
  )
  """Memory content (schema description, query pattern, user preference)"""
  content: String!
  """Semantic embedding vector for similarity search"""
  embedding: Vector @dim(len: {{.VectorSize}})
  """Category: schema, query_template, user_pattern, general"""
  category: String
  """Origin of this memory (session ID, tool name, etc.)"""
  source: String
  """When stored"""
  created_at: Timestamp @default(insert_exp: "NOW()")
}

