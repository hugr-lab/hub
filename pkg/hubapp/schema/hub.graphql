# Hub Service platform GraphQL schema.
#
# HB6 store-prune (2026-07-06): the ADK-era transcript/memory types were
# removed (conversations, agent_sessions, agent_messages, message_summary_items,
# agent_memory, query_registry, tool_calls, agent_runs, agent_results, llm_usage,
# conversation_context). The agent's real store lives in the Agent DB
# (hub.agent.db); this platform schema holds only the organization of hub
# users' interaction. `chats.agent_id` / `chats.root_session_id` are LOGICAL
# references into the Agent DB — the cross-source relation fields (chat →
# session / agent) are declared by a separate extension source (HB-EXT), not
# here, so this schema stays decoupled from the Agent DB.
#
# `agents` / `agent_types` are kept as the legacy Docker-spawn identity
# registry (duplicate of the Agent DB canon); they die in HB4.

"""Platform users synced from OIDC provider via JupyterHub login."""
type users @table(name: "users") {
  """OIDC username (preferred_username claim)"""
  id: String! @pk
  """Full name from OIDC profile"""
  display_name: String!
  """Email from OIDC profile"""
  email: String
  """Hugr role assigned via OIDC claim (e.g. admin, analyst)"""
  hugr_role: String!
  """Resolved workspace profile name"""
  profile: String
  """Last OIDC login timestamp"""
  last_login_at: Timestamp @default(insert_exp: "NOW()", update_exp: "NOW()")
  """Additional OIDC claims and user preferences"""
  metadata: JSON
}

"""Predefined agent configurations — image, capabilities, skills, and policies.
LEGACY: canon lives in the Agent DB (hub.agent.db.agent_types); dies in HB4."""
type agent_types @table(name: "agent_types") {
  """Unique type identifier (e.g. data-analyst, openclaw)"""
  id: String! @pk
  """Human-readable name shown in UI"""
  display_name: String!
  """What this agent type does"""
  description: String
  """Container image reference (e.g. hugr-lab/hub-agent:latest)"""
  image: String!
  """Allowed capabilities: python, bash, web_search"""
  capabilities: [String]
  """Allowed skill IDs (references filesystem catalog)"""
  allowed_skills: [String]
  """Tool allow/deny policy per tool name"""
  tool_policy: JSON
  """Maximum running instances per user"""
  max_instances_per_user: Int
  """Seconds of inactivity before auto-stop"""
  idle_timeout_seconds: Int
  """Runtime context filter: any, local (workspace only), remote (container only)"""
  runtime_context: String
  """Extra configuration (env vars, resource limits)"""
  metadata: JSON
}

"""Agent identity registry for the legacy Docker-spawn path.
LEGACY: canon lives in the Agent DB (hub.agent.db.agents); dies in HB4."""
type agents @table(name: "agents") {
  """Agent UUID"""
  id: String! @pk
  """Agent type configuration"""
  agent_type_id: String! @field_references(
    name: "agents_type_ref"
    references_name: "agent_types"
    field: "id"
    query: "agent_type"
    description: "Agent type configuration"
    references_query: "agents"
    references_description: "Agents of this type"
  )
  """Display name shown in chat UI"""
  display_name: String!
  """What this agent does"""
  description: String
  """Hugr user ID for impersonation"""
  hugr_user_id: String!
  """Hugr user name for audit"""
  hugr_user_name: String!
  """Hugr RBAC role"""
  hugr_role: String!
  """Last interaction timestamp"""
  last_activity_at: Timestamp
  """Creation timestamp"""
  created_at: Timestamp @default(insert_exp: "NOW()")
  """Extra configuration"""
  metadata: JSON
}

"""User-Agent access grant — who may talk to which agent. M:N with owner/member roles."""
type user_agents @table(name: "user_agents") {
  """User granted access"""
  user_id: String! @pk @field_references(
    name: "ua_user_ref"
    references_name: "users"
    field: "id"
    query: "user"
    description: "User with access to this agent"
    references_query: "agent_access"
    references_description: "Agent access grants for this user"
  )
  """Agent being accessed (logical reference to the Agent DB agent id)"""
  agent_id: String! @pk
  """Access level: owner (manage + chat) or member (chat only)"""
  role: String!
  """When access was granted"""
  created_at: Timestamp @default(insert_exp: "NOW()")
}

"""Project — a user-owned grouping of chats. Project artifacts (shared into
agent session context) attach here in a later phase."""
type projects @table(name: "projects") {
  """Project ID"""
  id: String! @pk
  """Owner user"""
  owner_user_id: String! @field_references(
    name: "projects_owner_ref"
    references_name: "users"
    field: "id"
    query: "owner"
    description: "User who owns this project"
    references_query: "projects"
    references_description: "Projects owned by this user"
  )
  """Project name"""
  name: String!
  """Creation timestamp"""
  created_at: Timestamp @default(insert_exp: "NOW()")
  """Last update timestamp"""
  updated_at: Timestamp @default(insert_exp: "NOW()", update_exp: "NOW()")
}

"""Chat — the user-facing conversation thread. 1—1 with a hugen ROOT session,
1—N with its full session tree. `agent_id` and `root_session_id` are LOGICAL
references into the Agent DB (hub.agent.db); the transcript is never copied
here. Cross-source fields (chat → session / agent) are added by the HB-EXT
extension source. MVP: one user + one agent."""
type chats @table(name: "chats") {
  """Chat ID"""
  id: String! @pk
  """Project this chat belongs to (null = ungrouped)"""
  project_id: String @field_references(
    name: "chats_project_ref"
    references_name: "projects"
    field: "id"
    query: "project"
    description: "Project this chat belongs to"
    references_query: "chats"
    references_description: "Chats in this project"
  )
  """Owner user"""
  user_id: String! @field_references(
    name: "chats_user_ref"
    references_name: "users"
    field: "id"
    query: "user"
    description: "User who owns this chat"
    references_query: "chats"
    references_description: "Chats owned by this user"
  )
  """Agent this chat talks to (logical reference to the Agent DB agent id)"""
  agent_id: String!
  """Display title"""
  title: String!
  """The hugen root session this chat drives (logical reference into hub.agent.db.sessions)"""
  root_session_id: String
  """Creation timestamp"""
  created_at: Timestamp @default(insert_exp: "NOW()")
  """Last update timestamp"""
  updated_at: Timestamp @default(insert_exp: "NOW()", update_exp: "NOW()")
  """Last activity timestamp — bumped EXPLICITLY by the gateway transport
  plane on message/inquiry submits only (spec-hub-gateway §3); deliberately
  no update_exp, so a rename/archive does not resurface the thread."""
  last_active_at: Timestamp @default(insert_exp: "NOW()")
  """Archived flag (boolean, NOT a timestamp: a null Timestamp mutation value
  coerces to the zero time engine-side — query-engine ask #9 — so an
  archived_at could never be cleared)"""
  archived: Boolean
}

"""Token and request budget limits per user, role, or global scope.
LLM providers are Hugr data sources (llm-openai, llm-anthropic, llm-gemini).
provider_id references the data source name (e.g. claude, gpt4)."""
type llm_budgets @table(name: "llm_budgets") {
  """Budget rule UUID"""
  id: String! @pk
  """Target scope: user:alice, role:analyst, or global"""
  scope: String!
  """LLM data source name (null applies to all providers)"""
  provider_id: String
  """Time period for this budget: hour, day, or month"""
  period: String!
  """Maximum input tokens per period (null for unlimited)"""
  max_tokens_in: BigInt
  """Maximum output tokens per period (null for unlimited)"""
  max_tokens_out: BigInt
  """Maximum request count per period (rate limit)"""
  max_requests: Int
  """When this budget rule was created"""
  created_at: Timestamp @default(insert_exp: "NOW()")
}

"""One-shot agent bootstrap secrets (spec-hub-side §1.5): sha256 hex of the spawn-time secret; consumed on first redeem at /agent/token. Plaintext is never stored."""
type agent_bootstrap_secrets @table(name: "agent_bootstrap_secrets") {
  """Secret record ID"""
  id: String! @pk
  """Agent this secret bootstraps"""
  agent_id: String!
  """sha256 hex of the plaintext secret"""
  secret_hash: String!
  """Redeem deadline — the secret is dead after this even if unconsumed"""
  expires_at: Timestamp!
  """Set on first successful redeem (one-shot)"""
  consumed_at: Timestamp
  """Mint timestamp"""
  created_at: Timestamp @default(insert_exp: "NOW()")
}
