"""Conversation context — recursive view that resolves messages across branched conversations."""
input conversation_context_args {
  conversation_id: String!
}

type conversation_context @view(
  name: "conversation_context"
  sql: """
  WITH RECURSIVE conv_chain AS (
    SELECT id, parent_id, branch_point_message_id, 0 AS depth
    FROM conversations WHERE id = [$conversation_id]
    UNION ALL
    SELECT c.id, c.parent_id, c.branch_point_message_id, cc.depth + 1
    FROM conversations c
    JOIN conv_chain cc ON c.id = cc.parent_id
    WHERE cc.depth < 3
  )
  SELECT m.id, m.conversation_id, m.role, m.content,
         m.tool_calls, m.tool_call_id, m.tokens_used, m.model,
         m.is_summary, m.summarized_by, m.created_at
  FROM agent_messages m
  JOIN conv_chain cc ON m.conversation_id = cc.id
  WHERE cc.branch_point_message_id IS NULL
     OR m.created_at <= (
       SELECT created_at FROM agent_messages
       WHERE id = cc.branch_point_message_id
     )
  ORDER BY m.created_at
  """
) @args(name: "conversation_context_args", required: true) {
  """Message ID"""
  id: String!
  """Conversation this message belongs to"""
  conversation_id: String!
  """Sender role"""
  role: String!
  """Message content"""
  content: String!
  """Tool calls (JSON)"""
  tool_calls: JSON
  """Tool call ID"""
  tool_call_id: String
  """Tokens used"""
  tokens_used: Int
  """Model used"""
  model: String
  """Whether this is a summary message"""
  is_summary: Boolean
  """Reference to summary that replaces this message"""
  summarized_by: String
  """Creation timestamp"""
  created_at: Timestamp!
}
