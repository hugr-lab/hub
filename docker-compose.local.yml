# Local development: singleuser workspace only.
# Hugr and Keycloak are expected to be running separately on the host.
#
# Usage:
#   docker compose -f docker-compose.local.yml up -d
#
# Hugr dev server: localhost:15004
# Keycloak:        localhost:18070

services:
  jupyter:
    build:
      context: .
      dockerfile: Dockerfile.singleuser
    environment:
      HUGR_URL: "${HUGR_URL:-http://host.docker.internal:15004}"
      HUGR_AUTH_MODE: "management"
      HUGR_SECRET_KEY: "${HUGR_SECRET_KEY:-local-dev-secret}"
      HUGR_CONNECTION_NAME: "${HUGR_CONNECTION_NAME:-default}"
    ports:
      - "8888:8888"
    volumes:
      - ./work:/home/jovyan/work
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --ServerApp.token='' --ServerApp.allow_origin='*'
    restart: unless-stopped
